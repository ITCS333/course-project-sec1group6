<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Resources</title>
    <link rel="stylesheet" href="style.css">
    <script src="admin.js" defer></script>
</head>
<body>
    <header>
        <h1>Manage Course Resources</h1>
    </header>

    <main>
        <section>
            <h2>Add a New Resource</h2>

            <form id="resource-form" action="#">
                <fieldset>
                    <legend>Resource Details</legend>

                    <label for="resource-title">Title</label>
                    <input id="resource-title" type="text" required>

                    <label for="resource-description">Description</label>
                    <textarea id="resource-description"></textarea>

                    <label for="resource-link">Resource Link</label>
                    <input id="resource-link" type="url" required>

                    <button id="add-resource" type="submit">Add Resource</button>
                </fieldset>
            </form>
        </section>

        <section>
            <h2>Existing Resources</h2>

            <table id="resources-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Link</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="resources-tbody">
                    <tr>
                        <td>Sample Resource</td>
                        <td>Sample description for the resource.</td>
                        <td><a href="#" target="_blank">Open Link</a></td>
                        <td>
                            <button class="edit-btn" data-id="1">Edit</button>
                            <button class="delete-btn" data-id="1">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
